task: stt_number
type: stt
version: "1.0"
description: >
  Number utterances only. Tests phone numbers, prices, dates,
  and quantities in Japanese business context.

corpus:
  path: corpora/stt/corpus_v2
  ground_truth: ground_truth.json

filter_categories: [number]

metrics: [cer, hallucination_count, latency_p50]

gates:
  median_cer:
    pass: 0.05
    warn: 0.10
