task: stt_model_selection
type: stt
version: "1.0"
description: >
  Zero-shot model selection benchmark. Run all candidate base models
  on the full v2 telephony corpus to find the best starting point
  for fine-tuning. Includes both clean and lenient CER metrics.

corpus:
  path: corpora/stt/corpus_v2
  ground_truth: ground_truth.json

metrics:
  - cer
  - lenient_cer
  - hallucination_count
  - latency_p50
  - latency_p90
  - rtf

gates:
  median_cer:
    pass: 0.05
    warn: 0.15
